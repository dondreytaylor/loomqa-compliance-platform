<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LoomQA Compliance Platform</title>
    <meta
      name="description"
      content="Entry point for the LoomQA Compliance Platform repository. The web app lives in platform/local."
    />
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
          sans-serif;
        margin: 40px;
        line-height: 1.5;
      }
      code {
        background: rgba(0, 0, 0, 0.06);
        padding: 2px 6px;
        border-radius: 6px;
      }
      pre {
        background: rgba(0, 0, 0, 0.06);
        padding: 12px;
        border-radius: 10px;
        overflow-x: auto;
      }
    </style>
  </head>
  <body>
    <h1>LoomQA Compliance Platform</h1>
    <p>
      The Next.js application is located at <code>platform/local</code>.
    </p>

    <h2>Run locally</h2>
    <pre><code>cd platform/local
npm install
npm run dev</code></pre>

    <h2>Run with Docker</h2>
    <pre><code>cd platform
docker compose up --build</code></pre>

    <p>
      GitHub remote:
      <a href="https://github.com/dondreytaylor/loomqa-compliance-platform.git"
        >https://github.com/dondreytaylor/loomqa-compliance-platform.git</a
      >
    </p>
  </body>
</html>
